<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posicionamento da margem</title>
    <style>
        .container {
           width: 80%;
            margin: 0 auto; /* Centraliza o contêiner horizontalmente */
        }

        .box {
            background-color: lightblue;
            padding: 20px;
            margin: 15px; /* Margem de 15px em todos os lados */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">Conteúdo da caixa 1</div>
        <div class="box">Conteúdo da caixa 2</div>
    </div>
</body>
</html>
