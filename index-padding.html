<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página com Padding</title>
    <style>
        .article-card {
            background-color: #f4f4f4;
            border: 1px solid #ddd; /* Borda simples */
            padding: 20px; /* Padding generoso */
        }
    </style>
</head>
<body>
    <div class="article-card">
        <h2>Título do Artigo</h2>
        <p>Este é um exemplo de um card que utiliza padding para garantir que o texto não fique muito colado nas bordas, melhorando a legibilidade e a estética geral.</p>
    </div>
</body>
</html>
