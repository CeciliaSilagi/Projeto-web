<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estilização de Links</title>
    <style>
        a:link {
            color: blue; /* Cor para links não visitados */
            text-decoration: none; /* Remove sublinhado */
        }

        a:visited {
            color: purple; /* Cor para links visitados */
        }

        a:hover {
            color: red; /* Cor para links quando o mouse passa por cima */
            text-decoration: underline; /* Sublinhado ao passar o mouse */
        }
    </style>
</head>
<body>
    <a href="https://www.example1.com">Site nao visitado</a><br>
    <a href="https://www.example2.com">Site visitado</a><br>
    <a href="https://www.example3.com">Site com foco</a><br>
</body>
</html>
