<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradientes Lineares com CSS</title>
    <style>
        .linear-gradient-box {
            height: 200px;
            background-color: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet); 
        }
    </style>
</head>
<body>
    <div class="linear-gradient-box">Este div tem um gradiente linear.</div>
</body>
</html>
