<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posicionamento de Layout</title>
    <style>
        .main-element {
            position: fixed; /* Pode ser absolute, relative, fixed ou sticky */
            left: 10px; /*Nao vai fazer efeito com position static*/
            bottom: 10px;
            background-color: yellow;
            padding: 10px;
        }

        html {
            height: 800px;
        }

        .parent-element {
            position: relative;
            height: 100px;
            padding: 10px;
            background-color: #81adc8;
        }

        .sibling-element {
            background-color: #f2f2f2;
            padding: 10px;
            border: 1px solid #81adc8;
        }
    </style>
</head>
<body>
    <div class="parent-element">
        <div class="sibling-element">Eu sou o outro elemento irmão</div>
        <div class="main-element">Eu sou o elemento principal</div>
        <div class="sibling-element">Eu sou o outro elemento irmão</div>
    </div>
</body>
</html>
