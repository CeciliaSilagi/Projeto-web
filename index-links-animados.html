<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transições e Animações</title>
    <style>
        /* Estilo básico do link*/
        a {
            display: inline-block;
            background-color: #0077cc;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s ease, color 0.3s ease; 
            /* Transição suave para cor de fundo e texto */
        }

        /* Estilo hover que desencadeia a transição */
        a:hover {
            background-color: #f03b35; 
        }

        /* Animação que ocorre uma única vez ao passar o mouse */
        a:hover {
            animation: rotate-link 0.5s ease;
        }

        /* Definição da animação de rotação */ 
        @keyframes rotate-link {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <h1>Links com Transições e Animações</h1>
    <a href="http://www.example1.com">Passe o mouse sobre mim!</a>
</body>
</html>
