<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estilização de Listas</title>
    <style>
        .square-bullets {
            list-style-type: square; /* Marcadores quadrados para a lista nao ordenada */
        }

    </style>
</head>
<body>
    <ul class="square-bullets">
        <li>Item Um</li>
        <li>Item Dois</li>
        <li>Item Três</li>
    </ul>
    <ol class="roman-numbers">
        <li>Primeiro</li>
        <li>Segundo</li>
        <li>Terceiro</li>
    </ol>
</body>
</html>
