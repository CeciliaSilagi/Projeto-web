<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estilização de Fundo e Preenchimento</title>
    <style>
        body {
            margin-top: 20px; /* Margem superior para separar do topo da página */
            padding: 0; /* Reseta o padding para o documento */
        }

        /*Estilização "normal" dos links de navegação */
        a {
            padding: 10px 20px;  /* Preenchimento vertical e horizontal*/
            background-color: #0077cc; /* Cor de fundo azul*/
            color: white; /* Cor do texto branco*/
            text-decoration: none; /* Remove o sublinhado dos links */
            margin: 5px;  /* Margem entre os links*/
            border-radius: 5px; /* Bordas arredondadas para um visual mais suave */
        }

        /* Estilização hover para os links de navegação */
        a:hover {
            background-color: #005fa3; /* Cor de fundo mais escura ao passar o mouse */
            color: #f7571d; /* Muda a cor do texto ao focar com o mouse */
        }
    </style>
</head>
<body>
    <a href="https://www.example1.com">Início</a>
    <a href="https://www.example2.com">Sobre</a>
    <a href="https://www.example3.com">Serviço</a>
    <a href="https://www.example4.com">Contato</a>
</body>
</html>
