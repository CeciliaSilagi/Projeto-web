<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estilização de Listas preenchidas</title>
    <style>
        .styled-list {
            margin: 20px; /* Espaçamento ao redor da lista */
            padding: 0; /* Remove o preenchimento padrão para usar o personalizado nos itens */
            list-style-type: none; /* Remove os marcadores padrão */
        }
    </style>
</head>
<body>
    <ul class="styled-list">
        <li>Primeiro Item</li>
        <li>Segundo Item</li>
        <li>Terceiro Item</li>
    </ul>
</body>
</html>
