<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borda com CSS</title>
    <style>
        .solid-border {
            border: 4px solid #0000FF; /* Borda sólida azul*/
        }
        .dotted-border {
            border: 4px dotted red; /* Borda pontilhada vermelha*/
        }
        .double-border {
            border: 4px double green; /* Borda dupla verde*/
        }

    </style>
</head>
<body>
    <div class="solid-border">Esta div tem uma borda sólida.</div>
    <div class="dotted-border">Esta div tem uma borda pontilhada.</div>
    <div class="double-border">Esta div tem uma borda verde</div>
</body>
</html>
